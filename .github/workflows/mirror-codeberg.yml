name: Mirror to Codeberg

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      mirror_release:
        description: 'Tag to mirror release for (e.g. v0.7.3). Leave empty to just sync code.'
        required: false
  workflow_run:
    workflows: ["Build & Release APK"]
    types: [completed]

# Required repository secrets:
#   CODEBERG_TOKEN  - Codeberg personal access token with repo write permissions
#   CODEBERG_USER   - Codeberg username

jobs:
  mirror-code:
    name: Mirror repo to Codeberg
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Push to Codeberg
        run: |
          git remote add codeberg https://${{ secrets.CODEBERG_USER }}:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/${{ secrets.CODEBERG_USER }}/FindMe.git
          git push codeberg --all --force
          git push codeberg --tags --force

  mirror-release:
    name: Mirror release to Codeberg
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mirror_release != '')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.mirror_release }}"
          else
            TAG=$(gh run view ${{ github.event.workflow_run.id }} --json headBranch -q .headBranch)
            if [[ ! "$TAG" =~ ^v ]]; then
              TAG=$(gh run view ${{ github.event.workflow_run.id }} --json event -q '.event.ref' | sed 's|refs/tags/||')
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Mirror release with APK
        if: startsWith(steps.tag.outputs.tag, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          CODEBERG_USER: ${{ secrets.CODEBERG_USER }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          echo "Mirroring release $TAG to Codeberg..."

          VERSION="${TAG#v}"
          CODEBERG_API="https://codeberg.org/api/v1"
          REPO="${CODEBERG_USER}/FindMe"

          # Debug: verify token and repo access
          echo "CODEBERG_USER=${CODEBERG_USER}"
          echo "REPO=${REPO}"
          AUTH_CHECK=$(curl -s -w "\n%{http_code}" -H "Authorization: token ${CODEBERG_TOKEN}" "${CODEBERG_API}/repos/${REPO}")
          AUTH_CODE=$(echo "$AUTH_CHECK" | tail -1)
          AUTH_BODY=$(echo "$AUTH_CHECK" | sed '$d')
          echo "Auth check status: $AUTH_CODE"
          echo "Repo full_name: $(echo "$AUTH_BODY" | jq -r '.full_name // "N/A"')"
          echo "Repo permissions: $(echo "$AUTH_BODY" | jq -r '.permissions // "N/A"')"

          # Get release notes from GitHub
          NOTES=$(gh release view "$TAG" --json body -q .body 2>/dev/null || echo "Release $TAG")
          TITLE=$(gh release view "$TAG" --json name -q .name 2>/dev/null || echo "$TAG")

          # Download APK from GitHub release
          mkdir -p /tmp/apk
          gh release download "$TAG" --pattern "*.apk" --dir /tmp/apk 2>/dev/null || true

          # Delete existing Codeberg release for this tag (if any)
          EXISTING_ID=$(curl -s \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            "${CODEBERG_API}/repos/${REPO}/releases/tags/${TAG}" \
            | jq -r '.id // empty' 2>/dev/null)
          if [ -n "$EXISTING_ID" ]; then
            echo "Deleting existing Codeberg release $EXISTING_ID..."
            curl -s -X DELETE \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              "${CODEBERG_API}/repos/${REPO}/releases/${EXISTING_ID}" || true
          fi

          # Get the commit SHA for the tag
          TAG_SHA=$(git rev-list -n 1 "$TAG" 2>/dev/null || echo "main")
          echo "Tag $TAG points to commit: $TAG_SHA"

          # Create release on Codeberg
          PAYLOAD=$(jq -n \
            --arg tag "$TAG" \
            --arg name "$TITLE" \
            --arg body "$NOTES" \
            --arg target "$TAG_SHA" \
            '{tag_name: $tag, name: $name, body: $body, target_commitish: $target, draft: false, prerelease: false}')
          echo "Request payload: $PAYLOAD"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${CODEBERG_API}/repos/${REPO}/releases")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          RESPONSE="$BODY"

          echo "Codeberg API response: $RESPONSE"
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "::error::Failed to create Codeberg release"
            exit 1
          fi
          echo "Created Codeberg release ID: $RELEASE_ID"

          # Upload APK if it was downloaded
          APK_FILE=$(ls /tmp/apk/*.apk 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "Uploading $(basename "$APK_FILE") to Codeberg release..."
            UPLOAD_RESPONSE=$(curl -s -X POST \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -F "attachment=@${APK_FILE}" \
              "${CODEBERG_API}/repos/${REPO}/releases/${RELEASE_ID}/assets")
            echo "Upload response: $UPLOAD_RESPONSE"
            echo "APK uploaded successfully"
          else
            echo "No APK found in GitHub release, skipping upload"
          fi
