name: Build & Release APK

on:
  release:
    types: [published]

# Required repository secrets:
#   RELEASE_KEYSTORE_BASE64    - base64-encoded .jks keystore (keytool -genkeypair ...)
#   RELEASE_KEYSTORE_PASSWORD  - keystore password
#   RELEASE_KEY_ALIAS          - key alias name
#   RELEASE_KEY_PASSWORD       - key password
#
# Generate a keystore:
#   keytool -genkeypair -v -storetype JKS -keyalg RSA -keysize 2048 -validity 10000 \
#     -storepass <password> -keypass <password> -alias findme -keystore findme-release.jks \
#     -dname "CN=FindMe, OU=FindMe, O=FindMe, L=Unknown, ST=Unknown, C=US"
#
# Encode to base64:
#   base64 -i findme-release.jks | pbcopy

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (code: $VERSION_CODE)"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: findme-app/package-lock.json

      - name: Install dependencies
        working-directory: findme-app
        run: npm ci --legacy-peer-deps

      - name: Decode keystore
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/findme-release.jks

      - name: Check keystore availability
        id: keystore
        run: |
          if [ -f /tmp/findme-release.jks ]; then
            echo "path=/tmp/findme-release.jks" >> "$GITHUB_OUTPUT"
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Using release keystore"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No release keystore configured — APK will be signed with debug keystore"
          fi

      - name: Patch version in build.gradle
        working-directory: findme-app/android/app
        run: |
          sed -i "s/versionCode .*/versionCode ${{ steps.version.outputs.version_code }}/" build.gradle
          sed -i "s/versionName .*/versionName \"${{ steps.version.outputs.version }}\"/" build.gradle

      - name: Bundle JS
        working-directory: findme-app
        run: npx expo export --platform android

      - name: Build release APK
        working-directory: findme-app/android
        env:
          RELEASE_KEYSTORE_PATH: ${{ steps.keystore.outputs.available == 'true' && '/tmp/findme-release.jks' || '' }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv findme-app/android/app/build/outputs/apk/release/app-release.apk \
             FindMe-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "FindMe-v${{ steps.version.outputs.version }}.apk" \
            --clobber

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/findme-release.jks
