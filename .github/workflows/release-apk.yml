name: Build & Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

# Required repository secrets:
#   RELEASE_KEYSTORE_BASE64    - base64-encoded .jks keystore (keytool -genkeypair ...)
#   RELEASE_KEYSTORE_PASSWORD  - keystore password
#   RELEASE_KEY_ALIAS          - key alias name
#   RELEASE_KEY_PASSWORD       - key password

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (code: $VERSION_CODE)"

      - name: Check if mobile app changed
        id: changes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
            echo "No previous tag found, building APK"
          else
            CHANGED=$(git diff --name-only "$PREV_TAG" "$TAG" -- findme-app/ | head -1)
            if [ -n "$CHANGED" ]; then
              echo "app_changed=true" >> "$GITHUB_OUTPUT"
              echo "Mobile app changed since $PREV_TAG, building new APK"
            else
              echo "app_changed=false" >> "$GITHUB_OUTPUT"
              echo "No mobile app changes since $PREV_TAG, will reuse previous APK"
            fi
          fi

      - name: Reuse APK from previous release
        id: reuse
        if: steps.changes.outputs.app_changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          echo "Downloading APK from release $PREV_TAG..."
          gh release download "$PREV_TAG" --pattern "*.apk" --dir .

          PREV_APK=$(ls FindMe-v*.apk 2>/dev/null | head -1)
          if [ -z "$PREV_APK" ]; then
            echo "::error::No APK found in previous release $PREV_TAG"
            echo "reused=false" >> "$GITHUB_OUTPUT"
          else
            mv "$PREV_APK" "FindMe-v${VERSION}.apk"
            echo "Reusing $PREV_APK as FindMe-v${VERSION}.apk"
            echo "reused=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set SOURCE_DATE_EPOCH for reproducible builds
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Setup Java 17
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Node 20
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: findme-app/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        working-directory: findme-app
        run: npm ci --legacy-peer-deps

      - name: Decode keystore
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not set. Cannot build release APK without signing keystore."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/findme-release.jks
          echo "Keystore decoded successfully"

      - name: Regenerate native project
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        working-directory: findme-app
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: npx expo prebuild --clean --platform android

      - name: Re-apply patches after prebuild
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        working-directory: findme-app
        run: npx patch-package

      - name: Verify generated build.gradle
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        working-directory: findme-app
        run: |
          echo "=== Signing config check ==="
          grep -A2 "signingConfigs.release" android/app/build.gradle || echo "WARNING: No release signing config found!"
          echo ""
          echo "=== Version check ==="
          grep "versionCode\|versionName" android/app/build.gradle | head -2
          echo ""
          echo "=== Manifest service check ==="
          grep -i "foregroundServiceType\|LocationTaskService\|POST_NOTIFICATIONS" android/app/src/main/AndroidManifest.xml || echo "WARNING: Missing service or permission!"
          echo ""
          echo "=== GMS removal check ==="
          if grep -r "com.google.android.gms" android/app/src/main/AndroidManifest.xml | grep -v 'tools:node="remove"'; then
            echo "WARNING: GMS references found in manifest!"
          else
            echo "OK: No GMS references in manifest"
          fi
          echo "=== Gradle GMS exclusion check ==="
          grep "exclude group.*google" android/app/build.gradle || echo "WARNING: No GMS exclusion in build.gradle!"
          echo ""
          echo "=== expo-location patch check ==="
          if grep -r "com.google.android.gms" node_modules/expo-location/android/src/ 2>/dev/null; then
            echo "ERROR: expo-location patch not applied — GMS imports still present!"
            exit 1
          else
            echo "OK: expo-location patch applied — no GMS imports"
          fi

      - name: Bundle JS
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        working-directory: findme-app
        run: npx expo export --platform android

      - name: Build release APK
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        working-directory: findme-app/android
        env:
          RELEASE_KEYSTORE_PATH: /tmp/findme-release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename artifact
        if: steps.changes.outputs.app_changed == 'true' || steps.reuse.outputs.reused == 'false'
        run: |
          mv findme-app/android/app/build/outputs/apk/release/app-release.apk \
             FindMe-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG exists — uploading APK..."
            gh release upload "$TAG" "FindMe-v${VERSION}.apk" --clobber
            # Publish if it was a draft
            gh release edit "$TAG" --draft=false
          else
            echo "No release for $TAG — creating one with auto-generated notes..."
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
                -f tag_name="$TAG" \
                -f target_commitish="${{ github.sha }}" \
                -f previous_tag_name="$PREV_TAG" \
                --jq '.body')
            else
              NOTES="Release $TAG"
            fi
            gh release create "$TAG" \
              "FindMe-v${VERSION}.apk" \
              --title "$TAG" \
              --notes "$NOTES" \
              --verify-tag
          fi

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/findme-release.jks
